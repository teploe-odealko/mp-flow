# MPFlow — self-hosted deployment
#
# Quick start:
#   curl -O https://raw.githubusercontent.com/teploe-odealko/mp-flow/main/docker-compose.yml
#   docker compose up -d
#
# Admin UI: http://localhost:3000
# First login: via Logto OIDC (or set up your own auth)

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mpflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mpflow_selfhost}
      POSTGRES_DB: mpflow
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mpflow -d mpflow']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-mpflow}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-mpflow123}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set mpflow http://minio:9000 $${MINIO_ROOT_USER:-mpflow} $${MINIO_ROOT_PASSWORD:-mpflow123};
      mc mb --ignore-existing mpflow/mpflow;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-mpflow}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-mpflow123}

  admin:
    image: ghcr.io/teploe-odealko/mp-flow/admin:latest
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mpflow:${DB_PASSWORD:-mpflow_selfhost}@postgres:5432/mpflow?sslmode=disable
      NODE_ENV: production
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-in-production}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-mpflow}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-mpflow123}
      S3_BUCKET: mpflow
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
  minio-data:
