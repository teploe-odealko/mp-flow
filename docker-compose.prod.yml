# Production compose for Dokploy deployment.
# admin image is pre-built by GitHub Actions and pushed to ghcr.io.

services:
  # ── Admin (backend + frontend) ─────────────────────────
  admin:
    image: ghcr.io/teploe-odealko/mp-flow/admin:latest
    pull_policy: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      COOKIE_SECRET: ${MEDUSA_COOKIE_SECRET:-change-in-production}
      MPFLOW_CLOUD: ${MPFLOW_CLOUD:-true}
      # Logto Auth (client-side @logto/browser SDK)
      LOGTO_ENDPOINT: ${LOGTO_ENDPOINT:-}
      LOGTO_SPA_APP_ID: ${LOGTO_SPA_APP_ID:-}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      TMAPI_API_TOKEN: ${TMAPI_API_TOKEN:-}
      # S3 File Storage (MinIO)
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-mpflow}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-mpflow123}
      S3_BUCKET: ${S3_BUCKET:-mpflow}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: "true"
      # AI Image Generation
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-${OPENROUTER_API:-}}
      OPENROUTER_IMAGE_MODEL: ${OPENROUTER_IMAGE_MODEL:-}
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network

  # ── Landing page ────────────────────────────────────────
  landing:
    build: ./landing
    environment:
      NODE_ENV: production
    networks:
      - dokploy-network

  # ── Documentation ───────────────────────────────────────
  docs:
    build: ./website
    networks:
      - dokploy-network

  # ── Logto (OIDC auth provider) ──────────────────────────
  logto-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: logto
      POSTGRES_PASSWORD: ${LOGTO_DB_PASSWORD}
      POSTGRES_DB: logto
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U logto']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - logto-db-data:/var/lib/postgresql/data
    networks:
      - dokploy-network

  logto:
    image: ghcr.io/logto-io/logto:1.36.0
    depends_on:
      logto-db:
        condition: service_healthy
    environment:
      DB_URL: postgresql://logto:${LOGTO_DB_PASSWORD}@logto-db:5432/logto
      ENDPOINT: https://auth.mp-flow.ru
      ADMIN_ENDPOINT: https://auth-admin.mp-flow.ru
      TRUST_PROXY_HEADER: 1
    entrypoint: ['sh', '-c', 'npm run cli db seed -- --swe && npm start']
    networks:
      - dokploy-network

  # ── MinIO (S3-compatible storage) ────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-mpflow}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-mpflow123}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dokploy-network

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-mpflow}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-mpflow123}
    entrypoint: >
      /bin/sh -c "
      mc alias set mpflow http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing mpflow/${S3_BUCKET:-mpflow};
      exit 0;
      "
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  logto-db-data:
  minio-data:
